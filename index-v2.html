<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Widforss Shorts</title>
<style>
  /* Figma type: "Greed Standard TRIAL Medium" */
  @font-face { font-family: 'Greed Standard TRIAL'; src: url('fonts/GreedStandardTRIAL-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Greed Standard TRIAL'; src: url('fonts/GreedStandardTRIAL-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1F1E1D;
    --rail-btn:  #3C3C39;
    --rail-pill: #292926;
    --add-green: #42541F;
    --time-gray: #919191;
    --prog-track:#474746;
    --prog-fill: #C5CEB7;
    --green-cart: #134B2B;
    --search-bg:  #F4F4F4;
    --gutter: clamp(24px, 4vw, 64px);
    --ease-standard: cubic-bezier(0.25, 0, 0.15, 1);
    --ease-expo-out: cubic-bezier(0.19, 1, 0.22, 1);
    --ease-overshoot: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    --ease-smooth-decel: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  html, body {
    background: #ffffff;
    color: #000;
    font-family: 'Greed Standard TRIAL', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  /* Device toggle */
  .device-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    display: flex; gap: 2px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 10px; padding: 3px;
  }
  .device-toggle button {
    background: none; border: none; cursor: pointer;
    padding: 7px 14px; border-radius: 8px;
    color: rgba(255,255,255,0.45);
    font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
    transition: all 0.3s var(--ease-expo-out);
  }
  .device-toggle button.active { background: rgba(255,255,255,0.18); color: #fff; }

  /* Screen frame */
  .desktop-frame {
    position: relative;
    width: min(1672px, calc(100vw - 80px));
    height: calc(100vh - 80px);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.18);
    background: var(--bg);
    transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1), height 0.6s cubic-bezier(0.65, 0, 0.35, 1);
  }
  body.mobile-mode .desktop-frame {
    width: 390px; height: 760px; max-height: calc(100vh - 60px);
    border-radius: 40px;
    box-shadow: 0 0 0 8px #222, 0 30px 80px rgba(0, 0, 0, 0.3);
  }

  .page { background: var(--bg); height: 100%; overflow: hidden; display: flex; flex-direction: column; }

  /* Content area — fullscreen dark player */
  .content-area {
    --video-h: min(1021px, calc(100vh - 250px));
    --video-w: calc(var(--video-h) * 0.5622);
    background: var(--bg);
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  body.mobile-mode .content-area { --video-h: 100%; --video-w: 100%; }

  .shorts-feed { position: relative; width: 100%; height: 100%; }

  /* Site header — refined Widforss nav (dept + logo + search/user/cart) */
  .site-header {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    height: 67px; padding: 0 var(--gutter); background: #fff;
  }
  .dept { justify-self: start; display: flex; align-items: center; gap: 28px; }
  .dept a { font-size: 16px; line-height: 20px; color: #000; padding: 2px 0; white-space: nowrap; }
  .dept a.active { background: #3D4B19; color: #fff; font-weight: 500; padding: 4px 7px; border-radius: 6px; }
  .logo-link { justify-self: center; line-height: 0; }
  .logo-link svg { display: block; width: 140px; height: 36px; }
  .header-right { display: flex; align-items: center; gap: 16px; justify-self: end; }
  .search-bar {
    width: 405px; height: 38px; background: var(--search-bg); border-radius: 6px;
    display: flex; align-items: center; padding: 0 16px; gap: 12px;
  }
  .search-bar input {
    flex: 1; min-width: 0; border: none; background: transparent;
    font: 400 16px/20px 'Greed Standard TRIAL', sans-serif; color: #000; outline: none;
  }
  .search-bar input::placeholder { color: #000; opacity: 1; }
  .search-bar svg { flex-shrink: 0; }
  .ib { background: none; border: none; cursor: pointer; padding: 0; color: #000; display: flex; }
  .ib svg { display: block; }
  .cart-area { position: relative; }
  .cart-badge {
    position: absolute; top: -6px; right: -8px; width: 18px; height: 18px;
    background: var(--green-cart); color: #fff; font-size: 10px; font-weight: 500;
    border-radius: 50%; display: grid; place-items: center;
  }
  .nav-sep { height: 1px; background: #e1e1e1; }
  /* desktop nav hidden on mobile, replaced by the compact mobile nav */
  body.mobile-mode .site-header, body.mobile-mode .nav-sep { display: none; }

  /* Mobile nav — compact Widforss header, sticky on top (ported from handoff.html) */
  .mobile-nav { display: none; }
  body.mobile-mode .mobile-nav {
    display: block; flex: none; position: sticky; top: 0; z-index: 80;
    background: #fff; padding: 26px 20px 16px;
  }
  .mn-top { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 30px; }
  .mn-burger {
    justify-self: start; background: none; border: none; padding: 0; cursor: pointer;
    width: 18px; display: flex; flex-direction: column; gap: 4px;
  }
  .mn-burger i { display: block; width: 18px; height: 1px; background: #000; }
  .mn-logo { justify-self: center; line-height: 0; }
  .mn-logo svg { display: block; width: 104px; height: 26px; }
  .mn-right { justify-self: end; }
  .mn-search {
    margin-top: 15px; height: 46px; background: #F3F3F3; border-radius: 6px;
    display: flex; align-items: center; gap: 12px; padding: 0 15px;
  }
  .mn-search svg { flex: none; color: #000; }
  .mn-search input {
    flex: 1; min-width: 0; border: none; background: transparent;
    font: 500 16px/20px 'Greed Standard TRIAL', sans-serif; color: #000; outline: none;
  }
  .mn-search input::placeholder { color: #7A7A7A; opacity: 1; }

  /* Close (top-right) */
  .close-x {
    position: absolute; top: 18px; right: 26px; z-index: 70;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--rail-pill); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s var(--ease-standard), transform 0.2s var(--ease-expo-out);
  }
  .close-x:hover { background: #34332f; transform: scale(1.06); }

  /* ---- Video ---- */
  .video-viewport {
    position: absolute; left: 50%; top: 0; transform: translateX(-50%);
    width: var(--video-w); max-width: 100%; height: 100%;
    overflow-y: scroll; scroll-snap-type: y mandatory;
    scrollbar-width: none; -ms-overflow-style: none;
    transition: transform 0.5s var(--ease-expo-out);
  }
  .video-viewport::-webkit-scrollbar { display: none; }
  .video-slide {
    position: relative; width: 100%; min-height: 100%;
    scroll-snap-align: center; scroll-snap-stop: always; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .video-card {
    position: relative; width: 100%; height: var(--video-h);
    border-radius: 12px; overflow: hidden; background: #000;
  }
  body.mobile-mode .video-card { border-radius: 0; }
  /* 1px inner black ring masks the light sub-pixel seam the rounded mask leaves on the video edge */
  .video-card::after { content: ''; position: absolute; inset: 0; border-radius: 12px; box-shadow: inset 0 0 0 1px #000; pointer-events: none; z-index: 3; }
  body.mobile-mode .video-card::after { display: none; }
  .video-card video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  /* embedded captioned HTML clip (shorts-video.html) as a slide */
  .embed-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
  .shorts-feed.embed-active .shorts-info { display: none; }
  .video-gradient {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,1) 100%);
    opacity: 0.6;
  }
  /* Tap-to-pause indicator */
  .pause-indicator {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0.8);
    width: 78px; height: 78px; border-radius: 50%;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center; padding-left: 5px;
    opacity: 0; pointer-events: none; z-index: 40;
    transition: opacity 0.2s var(--ease-standard), transform 0.28s var(--ease-overshoot);
  }
  .shorts-feed.paused .pause-indicator { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  /* Progress bar inside video, near bottom */
  .video-progress { position: absolute; bottom: 20px; left: 17px; right: 17px; height: 16px; display: flex; align-items: center; cursor: pointer; }
  .video-progress-track { width: 100%; height: 5px; background: var(--prog-track); border-radius: 16px; overflow: hidden; }
  .video-progress-fill { height: 100%; background: var(--prog-fill); border-radius: 16px; width: 0%; }

  /* ---- Left info column ---- */
  .shorts-info {
    position: absolute; left: clamp(40px, 4.3vw, 81px); top: 33%; z-index: 10;
    display: flex; flex-direction: column; max-width: 320px;
  }
  .si-title, .si-time, .si-tags, .shop-all-btn { will-change: transform, opacity; }
  .si-title {
    font-weight: 500; font-size: 36px; line-height: 1.15; color: #fff;
    max-width: 280px; opacity: 0; transform: translateY(16px);
  }
  .shorts-info.animate .si-title { animation: fadeUp 0.55s var(--ease-expo-out) 0s forwards; }
  .si-time {
    font-weight: 500; font-size: 18px; color: var(--time-gray);
    margin-top: 6px; opacity: 0; transform: translateY(12px);
  }
  .shorts-info.animate .si-time { animation: fadeUp 0.5s var(--ease-expo-out) 0.07s forwards; }
  .si-tags { display: flex; gap: 11px; margin-top: 28px; opacity: 0; transform: translateY(12px); }
  .shorts-info.animate .si-tags { animation: fadeUp 0.5s var(--ease-expo-out) 0.14s forwards; }
  .tag-chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 24px; border: 1px solid #fff; border-radius: 6px;
    font-weight: 500; font-size: 14px; line-height: 1; color: #fff;
  }
  .shop-all-btn {
    margin-top: 28px; align-self: flex-start;
    background: #fff; color: #000; border: none; border-radius: 12px;
    width: 170px; height: 36px; padding: 0 0 0 25px; text-align: left;
    font-family: inherit; font-weight: 500; font-size: 16px; cursor: pointer;
    opacity: 0; transform: translateY(12px);
    transition: background 0.2s var(--ease-standard);
  }
  .shorts-info.animate .shop-all-btn { animation: fadeUp 0.5s var(--ease-overshoot) 0.2s forwards; }
  .shop-all-btn:hover { background: #ececec; }
  .shop-all-btn[hidden] { display: none; }

  /* ---- Right rail ---- */
  .shorts-rail {
    position: absolute; left: calc(50% + var(--video-w) * 0.58); top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; z-index: 55;
  }
  .rail-arrow {
    width: 41px; height: 44px; border-radius: 12px; background: var(--rail-btn);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s var(--ease-standard), transform 0.2s var(--ease-expo-out);
  }
  .rail-arrow + .rail-arrow { margin-top: 8px; }
  .rail-arrow:hover { background: #46463f; }
  .rail-arrow:active { transform: scale(0.92); transition-duration: 0.1s; }
  .rail-pill {
    margin-top: 34px; width: 41px; min-height: 90px; border-radius: 12px; background: var(--rail-pill);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px 0; gap: 28px;
  }
  .rail-pill-btn {
    background: none; border: none; cursor: pointer; padding: 2px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.92; transition: opacity 0.2s, transform 0.2s var(--ease-expo-out);
  }
  .rail-pill-btn:hover { opacity: 1; transform: scale(1.1); }
  .rail-pill-btn.saved svg path { fill: var(--prog-fill); stroke: var(--prog-fill); }
  /* mute button: swap sound / muted icon by state */
  .rail-pill-btn .ic-muted { display: none; }
  .rail-pill-btn.muted .ic-sound { display: none; }
  .rail-pill-btn.muted .ic-muted { display: block; }

  /* Context menu (the "..." opens save/share) */
  .rail-menu {
    position: absolute; right: 53px; top: calc(50% + 36px);
    background: var(--rail-pill); border-radius: 12px; padding: 6px;
    display: flex; flex-direction: column; min-width: 132px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    opacity: 0; transform: translateX(8px) scale(0.96); transform-origin: right center;
    pointer-events: none; transition: opacity 0.2s var(--ease-standard), transform 0.2s var(--ease-expo-out);
    z-index: 60;
  }
  .rail-menu.open { opacity: 1; transform: translateX(0) scale(1); pointer-events: auto; }
  .rail-menu button {
    display: flex; align-items: center; gap: 10px;
    background: none; border: none; cursor: pointer; text-align: left;
    padding: 9px 12px; border-radius: 8px; color: #fff;
    font-family: inherit; font-weight: 500; font-size: 14px;
    transition: background 0.15s;
  }
  .rail-menu button:hover { background: rgba(255,255,255,0.08); }

  /* ---- Bottom-left product card (single product) ---- */
  .vp-card-wrap {
    position: absolute; left: clamp(40px, 4.3vw, 81px); z-index: 10;
    bottom: calc((100% - var(--video-h)) / 2); /* card bottom on the video's bottom line */
    transition: opacity 0.4s var(--ease-standard), transform 0.45s var(--ease-expo-out);
  }
  .vp-card-wrap[hidden] { display: none; }
  .vp-card-wrap.dismissed { opacity: 0; transform: translateY(24px); pointer-events: none; }
  .vp-card-label {
    font-weight: 500; font-size: 18px; color: #fff; margin-bottom: 22px;
    opacity: 0; transform: translateY(12px);
  }
  .vp-card-wrap.animate .vp-card-label { animation: fadeUp 0.5s var(--ease-expo-out) 0.1s forwards; }
  .vp-card {
    position: relative; width: 330px; height: 150px; background: #fff; border-radius: 12px;
    padding: 16px; display: flex; gap: 14px;
    opacity: 0; transform: translateY(16px) scale(0.97);
  }
  .vp-card-wrap.animate .vp-card { animation: cardIn 0.55s var(--ease-overshoot) 0.18s forwards; }
  .vp-card-thumb {
    width: 89px; height: 115px; border-radius: 12px; background: #B8B8B8; flex: none;
    align-self: center; overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .vp-card-thumb img { width: 100%; height: 100%; object-fit: contain; padding: 14px; mix-blend-mode: darken; }
  .vp-card-col { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100%; }
  .vp-card-name {
    font-weight: 500; font-size: 14px; color: #000; line-height: 1.25;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; padding-right: 18px;
  }
  .vp-card-freight { font-weight: 500; font-size: 14px; color: var(--time-gray); margin-top: 8px; }
  .vp-card-bottom { margin-top: auto; display: flex; align-items: center; justify-content: space-between; }
  .vp-card-price { font-weight: 500; font-size: 14px; color: #000; }
  .vp-card-add {
    height: 25px; padding: 0 12px; border: none; border-radius: 6px;
    background: var(--add-green); color: #fff; font-family: inherit; font-weight: 500; font-size: 14px;
    cursor: pointer; transition: background 0.15s;
  }
  .vp-card-add:hover { background: #506626; }
  .vp-card-x {
    position: absolute; top: 14px; right: 14px; width: 16px; height: 16px;
    background: none; border: none; cursor: pointer; padding: 0; opacity: 0.6;
    display: flex; align-items: center; justify-content: center; transition: opacity 0.15s;
  }
  .vp-card-x:hover { opacity: 1; }

  /* ---- Scrim behind the shop panel (dims the video + chrome) ---- */
  .shop-scrim {
    position: absolute; inset: 0; background: #000; opacity: 0;
    pointer-events: none; z-index: 56; /* above video/info/rail (55), below panel (60) & close-x (70) */
    transition: opacity 0.45s var(--ease-standard);
  }
  .shorts-feed.panel-open .shop-scrim { opacity: 0.55; pointer-events: auto; }

  /* ---- Bottom "Shop the products" panel ---- */
  .shop-panel {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 60; /* above the rail (55) so mute/arrows don't overlap */
    background: #fff; padding: 26px clamp(40px, 4.3vw, 74px) 30px;
    transform: translateY(100%);
    transition: transform 0.55s var(--ease-expo-out);
    max-height: 56%; display: flex; flex-direction: column;
  }
  .shorts-feed.panel-open .shop-panel { transform: translateY(0); }
  /* dim everything behind the panel */
  .shorts-feed.panel-open .shorts-info,
  .shorts-feed.panel-open .shorts-rail,
  .shorts-feed.panel-open .vp-card-wrap { opacity: 0.34; pointer-events: none; transition: opacity 0.4s var(--ease-standard); }
  .shorts-feed.panel-open .video-viewport { transform: translateX(-50%) translateY(-48px); }
  .shop-panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .shop-panel-title { font-weight: 500; font-size: 16px; color: #000; }
  .shop-panel-toggle {
    background: none; border: none; cursor: pointer; padding: 6px; opacity: 0.7;
    display: flex; align-items: center; justify-content: center; transition: opacity 0.15s;
  }
  .shop-panel-toggle:hover { opacity: 1; }
  .shop-panel-row { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: thin; }
  .sp-card {
    flex: 0 0 auto; width: 303px; height: 94px; display: flex; align-items: center; gap: 11px;
    background: #fff; border: 1px solid #DBDBDB; border-radius: 12px; padding: 16px 16px 16px 17px;
    opacity: 0; transform: translateY(14px);
  }
  .shorts-feed.panel-open .sp-card { animation: fadeUp 0.5s var(--ease-expo-out) forwards; }
  .shorts-feed.panel-open .sp-card:nth-child(1) { animation-delay: 0.18s; }
  .shorts-feed.panel-open .sp-card:nth-child(2) { animation-delay: 0.26s; }
  .shorts-feed.panel-open .sp-card:nth-child(3) { animation-delay: 0.34s; }
  .shorts-feed.panel-open .sp-card:nth-child(4) { animation-delay: 0.42s; }
  .sp-card-thumb {
    width: 49px; height: 62px; border-radius: 12px; background: #E6E6E6; flex: none;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .sp-card-thumb img { width: 34px; height: 44px; object-fit: contain; mix-blend-mode: darken; }
  .sp-card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .sp-card-name { font-weight: 500; font-size: 14px; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sp-card-price { font-weight: 500; font-size: 14px; color: var(--time-gray); }
  .sp-card-add {
    flex: none; width: 68px; height: 25px; padding: 0; border: none; border-radius: 6px;
    background: var(--add-green); color: #fff; font-family: inherit; font-weight: 500; font-size: 14px;
    cursor: pointer; transition: background 0.15s;
  }
  .sp-card-add:hover { background: #506626; }

  /* ---- Toast ---- */
  .toast {
    position: absolute; bottom: 34px; left: 50%; transform: translate(-50%, 14px);
    background: rgba(33, 47, 19, 0.96); color: #fff;
    padding: 11px 20px; border-radius: 12px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    z-index: 90; opacity: 0; pointer-events: none; white-space: nowrap;
    transition: opacity 0.25s var(--ease-standard), transform 0.35s var(--ease-overshoot);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* ---- keyframes ---- */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes cardIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

  /* ---- Mobile adaptation (basic) ---- */
  /* explicit heights so the video-card's 100% height resolves (else it collapses → blank) */
  body.mobile-mode .video-slide { height: 100%; min-height: 0; }
  body.mobile-mode .video-card { height: 100%; }
  body.mobile-mode .video-viewport { left: 0; transform: none; }
  body.mobile-mode .shorts-feed.panel-open .video-viewport { transform: translateY(-40px); }
  /* text/buttons sit ~28px above the player controls (progress bar at bottom:20 + ~8) */
  body.mobile-mode .shorts-info { left: 20px; top: auto; bottom: 56px; max-width: 70%; transition: bottom 0.5s var(--ease-expo-out); }
  /* single-product on mobile: text lifts to sit 28px above the card (card 150 + 28 + 56 bottom) */
  body.mobile-mode .shorts-feed.has-product .shorts-info { bottom: 234px; }
  /* dismissing the card drops the text back to the bottom */
  body.mobile-mode .shorts-feed.card-dismissed .shorts-info { bottom: 56px; }
  /* mobile: drop the "Produkt fra video:" label for simplicity */
  body.mobile-mode .vp-card-label { display: none; }
  body.mobile-mode .si-title { font-size: 24px; }
  body.mobile-mode .si-time { font-size: 14px; }
  body.mobile-mode .shorts-rail { left: auto; right: 14px; top: 50%; bottom: auto; transform: translateY(-50%); }
  body.mobile-mode .vp-card-wrap { bottom: 56px; left: 20px; right: auto; }
  body.mobile-mode .close-x { top: 14px; right: 14px; }

            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M12 16V3M12 3 7 8M12 3l5 5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Del
          </button>
        </div>
      </div>

      <!-- Bottom-left product card (single product) -->
      <div class="vp-card-wrap" id="vpCardWrap" hidden>
        <div class="vp-card-label">Produkt fra video:</div>
        <div class="vp-card" id="vpCard"></div>
      </div>

      <!-- Scrim behind the shop panel -->
      <div class="shop-scrim" id="shopScrim"></div>

      <!-- Bottom "Shop the products" panel -->
      <div class="shop-panel" id="shopPanel">
        <div class="shop-panel-head">
          <span class="shop-panel-title">Shop the products</span>
          <button class="shop-panel-toggle" id="panelToggle" aria-label="Lukk">
            <svg width="16" height="9" viewBox="0 0 16 9" fill="none"><path d="M1 1L8 8L15 1" stroke="#000" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="shop-panel-row" id="shopPanelRow"></div>
      </div>

      <!-- Toast -->
      <div class="toast" id="toast"></div>

    </div>
  </div>
</div>
</div>

<script>
(function() {
  const videos = [
    { src: 'SnapInsta.to_AQMvRqrxCp1k3C1N975d91bavqYCYKMBul9Kktj2yqpILzdCkufZH_Ks_FaeOseu6n3sbgnOE8ucXplwSB28y7v3GuKJL3mRiAfmccc.mp4',
      title: 'Hemma i naturen', time: '10 min siden', tags: ['Friluft'], products: [] },
    { src: 'SnapInsta.to_AQNAA6XSsiZrXgJPMYQEaiN7rcK7bvE5r8A04hu2z5EyID9HhnVrFcC3kzs4ZTWhEhN50zNfcbYhp3ehYATYPSq9oN7ZLS7pXuvZ3b4.mp4',
      title: 'Vintertur i fjällen', time: '35 min siden', tags: ['Friluft', 'Jakt'],
      products: [ { brand: 'Crispi', name: 'Summit GTX Jaktstövlar', price: '4 299 kr', img: 'skoo.png', freight: 'Gratis frakt!' } ] },
    { src: 'SnapInsta.to_AQOXPGgcx70qtQNQ9pjM5Hc0mL6XLphl9_5AXEXz4E7NEPraInD-vHxiaZuNC-JvvC3kzDT5_gla2Xvs9ROfXjQNs7WpQk7bypZQiJk.mp4',
      title: 'Morgon vid sjön', time: '1 tim sedan', tags: ['Friluft'],
      products: [ { brand: 'Stabilotherm', name: 'Vaffeljärn Älg', price: '399 kr', img: 'mat.webp' } ] },
    { src: 'SnapInsta.to_AQP9ZDSEZS3pE4-mPx2REq79l4nIFBL9fHAd70lai536YfaIbi4wvZfw7Yi63NRpjXN9aIwYYYp_aCoZC61In5Xb6XRZxK7E2jAO-QU.mp4',
      title: 'Jakten börjar', time: '2 tim sedan', tags: ['Jakt', 'Friluft'],
      products: [
        { brand: 'Crispi', name: 'Summit GTX Jaktstövlar', price: '4 299 kr', img: 'skoo.png', freight: 'Gratis frakt!' },
        { brand: 'Härkila', name: 'Trucker Caps', price: '349 kr', img: 'caps.png' },
        { brand: 'Härkila', name: 'Pro Hunter GTX Jacket', price: '8 999 kr', img: 'harkilaa.png', freight: 'Gratis frakt!' },
      ] },
    { src: 'SnapInsta.to_AQPKH78_nvSITJpunsEZkA24d1cEYbtMZo0oYIZizjgG8enZBM_pxKzITXMsidQL4eWDQa0MpGGUqIE-Ihxey76GrndSuY2HXdcfIgI.mp4',
      title: 'Tältliv', time: '3 tim sedan', tags: ['Friluft'],
      products: [ { brand: 'Stabilotherm', name: 'Vaffeljärn Älg', price: '399 kr', img: 'mat.webp' } ] },
    { src: 'SnapInsta.to_AQPu0MsM9SpjJjELuKtq-S9H2kJ8j-GqlNDgjrr-oTTavF-3ZjL-lPvo3PADQmqzqZwKVhO1hFWnIan3E1qis-ob0Oy3C36Q4MjCGKY.mp4',
      title: 'Ut på tur', time: '4 tim sedan', tags: ['Friluft'], products: [] },
  ];

  const viewport   = document.getElementById('videoViewport');
  const shortsFeed = document.getElementById('shortsFeed');
  const shortsInfo = document.getElementById('shortsInfo');
  const siTitle    = document.getElementById('siTitle');
  const siTime     = document.getElementById('siTime');
  const siTags     = document.getElementById('siTags');
  const shopAllBtn = document.getElementById('shopAllBtn');
  const navUp      = document.getElementById('navUp');
  const navDown    = document.getElementById('navDown');
  const muteBtn    = document.getElementById('muteBtn');
  const moreBtn    = document.getElementById('moreBtn');
  const railMenu   = document.getElementById('railMenu');
  const vpCardWrap = document.getElementById('vpCardWrap');
  const vpCard     = document.getElementById('vpCard');
  const shopPanel  = document.getElementById('shopPanel');
  const shopPanelRow = document.getElementById('shopPanelRow');
  const panelToggle  = document.getElementById('panelToggle');
  const shopScrim  = document.getElementById('shopScrim');
  const closeX     = document.getElementById('closeX');
  const toast      = document.getElementById('toast');

  let currentIndex = 0;
  let isMuted = true;
  let feed = [];
  let toastTimer;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function appendSlide(v) {
    const idx = feed.length;
    feed.push(v);
    const slide = document.createElement('div');
    slide.className = 'video-slide';
    if (v.embed) {
      slide.innerHTML = `<div class="video-card"><iframe class="embed-frame" src="${v.embed}" title="${escapeHtml(v.title || '')}" scrolling="no" tabindex="-1"></iframe></div>`;
    } else {
      slide.innerHTML = `
        <div class="video-card">
          <video src="${v.src}" muted playsinline preload="${idx < 2 ? 'auto' : 'metadata'}"></video>
          <div class="video-gradient"></div>
          <div class="video-progress"><div class="video-progress-track"><div class="video-progress-fill"></div></div></div>
        </div>`;
    }
    viewport.appendChild(slide);
    observer.observe(slide);
    const vid = slide.querySelector('video');
    if (vid) vid.addEventListener('ended', () => {
      if (shortsFeed.classList.contains('panel-open')) { vid.currentTime = 0; vid.play().catch(() => {}); return; }
      goToSlide(idx + 1);
    });
  }

  function addBatch() {
    let batch = shuffle(videos);
    const lastInFeed = feed.length > 0 ? feed[feed.length - 1].src : null;
    if (batch[0].src === lastInFeed) {
      const swapIdx = batch.findIndex((v, i) => i > 0 && v.src !== lastInFeed);
      if (swapIdx > 0) [batch[0], batch[swapIdx]] = [batch[swapIdx], batch[0]];
    }
    batch.forEach(appendSlide);
  }

  function goToSlide(index) {
    if (index >= feed.length - 2) addBatch();
    if (index < 0 || index >= feed.length) return;
    viewport.querySelectorAll('.video-slide')[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
        const slides = Array.from(viewport.querySelectorAll('.video-slide'));
        const idx = slides.indexOf(entry.target);
        if (idx !== -1 && idx !== currentIndex) { currentIndex = idx; onSlideChange(); }
      }
    });
  }, { root: viewport, threshold: [0.6] });

  function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

  function renderCard(p) {
    vpCard.innerHTML = `
      <button class="vp-card-x" aria-label="Lukk">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1l-8 8" stroke="#000" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <div class="vp-card-thumb" ${p.thumbBg ? `style="background:${p.thumbBg}"` : ''}>
        ${p.img ? `<img src="${p.img}" alt="${escapeHtml(p.name)}">` : ''}
      </div>
      <div class="vp-card-col">
        <span class="vp-card-name">${escapeHtml(p.brand + ' ' + p.name)}</span>
        ${p.freight ? `<span class="vp-card-freight">${escapeHtml(p.freight)}</span>` : ''}
        <div class="vp-card-bottom">
          <span class="vp-card-price">${escapeHtml(p.price)}</span>
          <button class="vp-card-add">Legg til</button>
        </div>
      </div>`;
  }

  function onSlideChange() {
    const v = feed[currentIndex];
    closePanel();
    closeMenu();
    vpCardWrap.classList.remove('dismissed');
    shortsFeed.classList.remove('card-dismissed');
    shortsFeed.classList.remove('paused');

    shortsInfo.classList.remove('animate');
    vpCardWrap.classList.remove('animate');
    void shortsInfo.offsetWidth;

    // embed slides (the captioned HTML clip) carry their own captions — hide the info column
    shortsFeed.classList.toggle('embed-active', !!v.embed || !!v.noInfo);

    siTitle.textContent = v.title || '';
    siTime.textContent = v.time || '';
    siTags.innerHTML = (v.tags || []).map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join('');

    const n = v.products ? v.products.length : 0;
    shortsFeed.classList.toggle('has-product', n === 1);
    if (n === 1) {
      shopAllBtn.hidden = true;
      renderCard(v.products[0]);
      vpCardWrap.hidden = false;
      void vpCardWrap.offsetWidth;
      vpCardWrap.classList.add('animate');
    } else if (n > 1) {
      vpCardWrap.hidden = true;
      shopAllBtn.hidden = false;
    } else {
      vpCardWrap.hidden = true;
      shopAllBtn.hidden = true;
    }
    shortsInfo.classList.add('animate');

    if (currentIndex >= feed.length - 3) addBatch();

    const allSlides = viewport.querySelectorAll('.video-slide');
    allSlides.forEach((slide, i) => {
      const vid = slide.querySelector('video');
      if (!vid) return; /* embed slide has no <video> */
      if (i === currentIndex) { vid.play().catch(() => {}); vid.muted = isMuted; }
      else { vid.pause(); vid.currentTime = 0; }
    });
  }

  // Click-to-seek on the progress bar, otherwise tap the video to pause/resume
  viewport.addEventListener('click', (e) => {
    const bar = e.target.closest('.video-progress');
    if (bar) {
      const track = bar.querySelector('.video-progress-track');
      const rect = track.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const vid = bar.closest('.video-slide')?.querySelector('video');
      if (vid && vid.duration) vid.currentTime = pct * vid.duration;
      return;
    }
    const vid = e.target.closest('.video-slide')?.querySelector('video');
    if (!vid) return;
    if (vid.paused) { vid.play().catch(() => {}); shortsFeed.classList.remove('paused'); }
    else { vid.pause(); shortsFeed.classList.add('paused'); }
  });
  function updateProgress() {
    viewport.querySelectorAll('.video-slide').forEach((slide) => {
      const vid = slide.querySelector('video');
      const fill = slide.querySelector('.video-progress-fill');
      if (vid && fill && vid.duration) fill.style.width = (vid.currentTime / vid.duration) * 100 + '%';
    });
    requestAnimationFrame(updateProgress);
  }
  requestAnimationFrame(updateProgress);

  navUp.addEventListener('click', () => goToSlide(currentIndex - 1));
  navDown.addEventListener('click', () => goToSlide(currentIndex + 1));

  muteBtn.addEventListener('click', () => {
    isMuted = !isMuted;
    const vid = viewport.querySelectorAll('.video-slide')[currentIndex]?.querySelector('video');
    if (vid) vid.muted = isMuted;
    muteBtn.classList.toggle('muted', isMuted);
  });

  // ---- Toast + cart ----
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // ---- Bottom shop panel ----
  function openPanel() {
    const v = feed[currentIndex];
    if (!v.products || v.products.length < 2) return;
    shopPanelRow.innerHTML = v.products.map(p => `
      <div class="sp-card">
        <div class="sp-card-thumb" ${p.thumbBg ? `style="background:${p.thumbBg}"` : ''}>
          ${p.img ? `<img src="${p.img}" alt="${escapeHtml(p.name)}">` : ''}
        </div>
        <div class="sp-card-info">
          <span class="sp-card-name">${escapeHtml(p.brand + ' ' + p.name)}</span>
          <span class="sp-card-price">${escapeHtml(p.price)}</span>
        </div>
        <button class="sp-card-add">Legg til</button>
      </div>`).join('');
    shortsFeed.classList.add('panel-open');
  }
  function closePanel() { shortsFeed.classList.remove('panel-open'); }

  shopAllBtn.addEventListener('click', openPanel);
  panelToggle.addEventListener('click', closePanel);
  shopScrim.addEventListener('click', closePanel);

  // panel "Legg til"
  shopPanelRow.addEventListener('click', (e) => {
    if (e.target.closest('.sp-card-add')) showToast('Lagt i handlekurv');
  });

  // single card actions
  vpCard.addEventListener('click', (e) => {
    if (e.target.closest('.vp-card-add')) { showToast('Lagt i handlekurv'); return; }
    if (e.target.closest('.vp-card-x')) {
      vpCardWrap.classList.add('dismissed');
      shortsFeed.classList.add('card-dismissed');
      return;
    }
  });

  // ---- Context menu (save / share) ----
  function openMenu() { railMenu.classList.add('open'); }
  function closeMenu() { railMenu.classList.remove('open'); }
  moreBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    railMenu.classList.toggle('open');
  });
  railMenu.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const act = btn.dataset.act;
    if (act === 'save') {
      moreBtn.classList.toggle('saved');
      showToast(moreBtn.classList.contains('saved') ? 'Lagret' : 'Fjernet fra lagret');
    } else if (act === 'share') {
      navigator.clipboard?.writeText(location.href).catch(() => {});
      showToast('Lenke kopiert');
    }
    closeMenu();
  });
  document.addEventListener('click', (e) => {
    if (!railMenu.contains(e.target) && e.target !== moreBtn && !moreBtn.contains(e.target)) closeMenu();
  });

  closeX.addEventListener('click', () => { closePanel(); closeMenu(); });

  // ---- wheel / keyboard ----
  document.addEventListener('wheel', (e) => {
    if (shortsFeed.classList.contains('panel-open')) {
      if (e.target.closest('.shop-panel-row')) return; // let the row scroll
      e.preventDefault();
      return;
    }
    e.preventDefault();
    viewport.scrollBy({ top: e.deltaY * 2 });
  }, { passive: false });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (railMenu.classList.contains('open')) { closeMenu(); return; }
      if (shortsFeed.classList.contains('panel-open')) { closePanel(); return; }
    }
    if (shortsFeed.classList.contains('panel-open')) return;
    if (e.key === 'ArrowDown' || e.key === 'j') goToSlide(currentIndex + 1);
    if (e.key === 'ArrowUp' || e.key === 'k') goToSlide(currentIndex - 1);
    if (e.key === 'm') muteBtn.click();
  });

  // ---- Device toggle ----
  const btnDesktop = document.getElementById('toggleDesktop');
  const btnMobile  = document.getElementById('toggleMobile');
  btnDesktop.addEventListener('click', () => {
    document.body.classList.remove('mobile-mode');
    btnDesktop.classList.add('active'); btnMobile.classList.remove('active');
    closePanel();
  });
  btnMobile.addEventListener('click', () => {
    document.body.classList.add('mobile-mode');
    btnMobile.classList.add('active'); btnDesktop.classList.remove('active');
    closePanel();
  });

  // Carry the view through from the entry page (start.html links with ?view=mobile)
  if (new URLSearchParams(location.search).get('view') === 'mobile') btnMobile.click();

  // ---- Init ----
  // First clip = the captioned "Klipp från er" montage, rendered to a real mp4 so it
  // behaves exactly like any other video (no iframe). Baked captions sit centre-bottom;
  // the left info column carries its own title/tags like every other clip.
  appendSlide({ src: 'klipp-fran-er.mp4', title: 'Era bästa stunder', time: 'Nyss', tags: ['Friluft', 'Kund'], products: [] });
  addBatch();
  onSlideChange();
  const curVid = viewport.querySelectorAll('.video-slide')[currentIndex]?.querySelector('video');
  if (curVid) curVid.play().catch(() => {});
})();
</script>

</body>
</html>
