<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Widforss Shorts — start</title>
<style>
  @font-face { font-family:'Greed Standard'; src:url('fonts/GreedStandardTRIAL-Regular.otf') format('opentype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Greed Standard'; src:url('fonts/GreedStandardTRIAL-Medium.otf') format('opentype'); font-weight:500; font-display:swap; }

  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --nav-font:'Greed Standard','Helvetica Neue',Arial,sans-serif; }
  html,body { height:100%; }
  body { background:#fff; font-family:var(--nav-font); -webkit-font-smoothing:antialiased;
    min-height:100vh; display:flex; align-items:center; }
  a { color:inherit; text-decoration:none; }

  /* Device toggle — reused from index-v2.html */
  .device-toggle {
    position:fixed; top:16px; right:16px; z-index:9999; display:flex; gap:2px;
    background:rgba(0,0,0,0.65); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-radius:10px; padding:3px;
  }
  .device-toggle button {
    background:none; border:none; cursor:pointer; padding:7px 14px; border-radius:8px;
    color:rgba(255,255,255,0.45); font-size:13px; font-weight:500; letter-spacing:0.02em;
    transition:all .3s cubic-bezier(0.16,1,0.3,1); font-family:var(--nav-font);
  }
  .device-toggle button.active { background:rgba(255,255,255,0.18); color:#fff; }

  /* ===================== "Klipp från er" module ===================== */
  /* max-width = exactly 4 cards + gaps + gutters (4·318 + 3·24 + 2·36 = 1416) so the row fills edge-to-edge
     and the nav arrows (at the right gutter) line up with the last card's right edge */
  .km-module { width:100%; max-width:1416px; margin:0 auto; padding:0 36px; }
  /* head height == title height (arrows are absolute) so margin-bottom IS the title→thumbnail gap (48px, per handoff spec) */
  .km-head { position:relative; display:flex; align-items:center; margin-bottom:48px; }
  .km-title { display:flex; align-items:center; gap:14px; font-weight:500; font-size:36px; line-height:1.15; color:#000; }
  .km-title svg { display:block; transform:translateY(0.07em); }   /* optical: centered on the word's ink, not the line box */
  .km-nav { position:absolute; right:0; top:50%; transform:translateY(-50%); }

  /* Slider arrows — dp-nav2 (joined pill, linked slide-on-hover) from Dealspage/widforss.html */
  .dp-prevnext { display:inline-flex; width:82px; height:45px; border:1px solid rgb(0 0 0 / 20%); overflow:hidden; border-radius:6px; }
  .dp-pn-btn { width:41px; height:100%; display:grid; place-items:center; background:#fff; border:0; padding:0; cursor:pointer; color:#000; }
  .dp-pn-ico { display:block; pointer-events:none; transition:opacity 200ms ease, transform 200ms ease; }
  .dp-pn-ico svg { height:16px; width:auto; display:block; }
  .dp-pn-btn[data-dir="prev"] .dp-pn-ico { transform:rotate(180deg); }
  .dp-prevnext.is-next-hover [data-dir="next"] .dp-pn-ico { transform:translate(-104%,0); }
  .dp-prevnext.is-next-hover [data-dir="prev"] .dp-pn-ico { opacity:0; transform:rotate(180deg) translate(100%,0); }
  .dp-prevnext.is-prev-hover [data-dir="prev"] .dp-pn-ico { transform:rotate(180deg) translate(-104%,0); }
  .dp-prevnext.is-prev-hover [data-dir="next"] .dp-pn-ico { opacity:0; transform:translate(100%,0); }
  .dp-pn-btn.is-disabled { pointer-events:none; cursor:default; }
  .dp-pn-btn.is-disabled .dp-pn-ico { opacity:.35; }

  .km-row { display:flex; gap:24px; overflow-x:auto; scroll-snap-type:x mandatory; scroll-behavior:smooth;
    scrollbar-width:none; -ms-overflow-style:none; }
  .km-row::-webkit-scrollbar { display:none; }
  .km-card { position:relative; flex:0 0 318px; height:399px; border-radius:12px; overflow:hidden; display:block; background:#111; cursor:pointer; scroll-snap-align:start; }
  .km-card img, .km-card video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .km-card video { opacity:0; transition:opacity .25s ease; }         /* poster still shows; clip fades in on hover */
  .km-card:hover video { opacity:1; }
  .km-card-grad { position:absolute; inset:0; pointer-events:none; background:linear-gradient(180deg, rgba(0,0,0,0) 45%, rgba(0,0,0,0.92) 100%); }
  .km-card-name { position:absolute; left:17px; right:17px; bottom:18px; font-weight:500; font-size:28px; line-height:1.12; color:#fff; }

  /* ===================== Mobile module (410-wide) ===================== */
  .km-module-m { display:none; width:410px; max-width:100%; margin:0 auto; padding:0 19px; }
  .km-title-m { display:flex; align-items:center; gap:11px; font-weight:500; font-size:28px; line-height:1.15; color:#000; margin-bottom:23px; }
  .km-title-m svg { display:block; transform:translateY(0.07em); }
  .km-row-m { display:flex; gap:12px; overflow-x:auto; scroll-snap-type:x mandatory; scroll-behavior:smooth;
    scrollbar-width:none; -ms-overflow-style:none; padding-right:19px; }
  .km-row-m::-webkit-scrollbar { display:none; }
  .km-card-m { position:relative; flex:0 0 260px; height:324px; border-radius:12px; overflow:hidden; display:block; background:#111; scroll-snap-align:start; }
  .km-card-m img, .km-card-m video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .km-card-grad-m { position:absolute; inset:0; pointer-events:none; background:linear-gradient(180deg, rgba(0,0,0,0) 45%, rgba(0,0,0,0.92) 100%); }
  .km-card-name-m { position:absolute; left:15px; right:15px; bottom:44px; font-weight:500; font-size:24px; line-height:1.12; color:#fff; }

  body.mobile-mode .km-module { display:none; }
  body.mobile-mode .km-module-m { display:block; }
</style>
</head>

<script>
  // Poster still by default; play the clip on hover
  document.querySelectorAll('.km-card').forEach(card => {
    const v = card.querySelector('video');
    if (!v) return;
    card.addEventListener('mouseenter', () => { v.currentTime = 0; v.play().catch(() => {}); });
    card.addEventListener('mouseleave', () => { v.pause(); v.currentTime = 0; });
  });

  // Slider — dp-nav2 arrows drive the desktop card track
  (function initSlider() {
    const nav = document.querySelector('.km-nav');
    const track = document.querySelector('[data-slider]');
    if (!nav || !track) return;
    const prevnext = nav.querySelector('.dp-prevnext');
    const prevBtn = nav.querySelector('[data-dir="prev"]');
    const nextBtn = nav.querySelector('[data-dir="next"]');
    nextBtn.addEventListener('mouseenter', () => prevnext.classList.add('is-next-hover'));
    nextBtn.addEventListener('mouseleave', () => prevnext.classList.remove('is-next-hover'));
    prevBtn.addEventListener('mouseenter', () => prevnext.classList.add('is-prev-hover'));
    prevBtn.addEventListener('mouseleave', () => prevnext.classList.remove('is-prev-hover'));
    const step = () => { const it = track.querySelector('.km-card'); return it ? it.getBoundingClientRect().width + 24 : track.clientWidth; };
    function updateArrows() {
      const max = track.scrollWidth - track.clientWidth;
      prevBtn.classList.toggle('is-disabled', track.scrollLeft <= 1);
      nextBtn.classList.toggle('is-disabled', track.scrollLeft >= max - 1);
    }
    updateArrows();
    track.addEventListener('scroll', () => requestAnimationFrame(updateArrows));
    window.addEventListener('resize', updateArrows);
    prevBtn.addEventListener('click', () => track.scrollBy({ left: -step(), behavior: 'smooth' }));
    nextBtn.addEventListener('click', () => track.scrollBy({ left: step(), behavior: 'smooth' }));
  })();

  // Device toggle
  const btnDesktop = document.getElementById('toggleDesktop');
  const btnMobile = document.getElementById('toggleMobile');
  btnDesktop.addEventListener('click', () => {
    document.body.classList.remove('mobile-mode');
    btnDesktop.classList.add('active'); btnMobile.classList.remove('active');
  });
  btnMobile.addEventListener('click', () => {
    document.body.classList.add('mobile-mode');
    btnMobile.classList.add('active'); btnDesktop.classList.remove('active');
  });
  if (new URLSearchParams(location.search).get('view') === 'mobile') btnMobile.click();
</script>
